<header>
    <h1>Entre em Contato</h1>
    <p>Tem alguma dúvida ou sugestão? Envie uma mensagem!</p>
</header>

<main class="container">
    <section class="page-card">
        <h2>Formulário de Contato</h2>
        
        <form id="form-contato" style="display: flex; flex-direction: column; gap: 15px;">
            <div>
                <label style="display: block; margin-bottom: 5px; font-weight: bold;">Nome:</label>
                <input type="text" id="nome" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
            </div>
            
            <div>
                <label style="display: block; margin-bottom: 5px; font-weight: bold;">E-mail:</label>
                <input type="email" id="email" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
            </div>
            
            <div>
                <label style="display: block; margin-bottom: 5px; font-weight: bold;">Mensagem:</label>
                <textarea id="mensagem" rows="5" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;"></textarea>
            </div>
            
            <button type="submit" style="background-color:  #38bdf8; color: white; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">Enviar Mensagem</button>
        </form>
    </section>
</main>
